<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colored Page</title>

    <style>

        body{
            background-color: #8b9a9b;
            margin: 0;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        header{
            background-color: #626987;
            color: white;
            padding: 20px;
        }

        footer{
            background-color: #9eaeb8;
            color: white;
            padding: 15px;
            margin-top: 30px;
        }

        /* Form Box */
        form{
            background-color: white;

            width: 350px;

            margin: 60px auto;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input{
            padding: 10px;
            width: 250px;

            border: none;

            border-radius: 5px;

            background-color: #f1f1f1;

            font-size: 15px;
        }

        /* Search/Text Input */
        input[type="text"]{
            padding: 10px;
        }

        button{
            padding: 10px 20px;

            background-color: #626987;

            border: none;

            border-radius: 5px;

            color: white;

            cursor: pointer;

            font-size: 16px;
        }

        button:hover{
            background-color: #4d5470;
        }

    </style>

</head>

<body>

    <header>
        <h1>Welcome to Dialcon</h1>
    </header>

    <form action="/action.php">

        <input type="text" placeholder="Username">

        <br><br>

        <input type="password" placeholder="Old Password">

        <br><br>

        <input type="password" placeholder="New Password">

        <br><br>

        <br><br>

        <button type="submit">Submit</button>

    </form>

    <footer>
        <p>Footer Section</p>
    </footer>

</body>
</html>
