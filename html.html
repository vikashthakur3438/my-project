<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="my amazon.css">

</head>

<body>

    <!-- NAVBAR -->

    <header>

        <div class="navbar">

            <!-- LOGO -->

            <div class="nav-logo border">
                <div class="logo"></div>
            </div>

            <!-- ADDRESS -->

            <div class="nav-address border">

                <p class="add-first">Deliver to</p>

                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>

                    <p class="add-second">India</p>
                </div>

            </div>

            <!-- SEARCH -->

            <div class="nav-search">

                <select class="search-select">
                    <option>All</option>
                </select>

                <input
                placeholder="Search Amazon"
                class="search-input">

                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

            </div>

            <!-- SIGN IN -->

            <div class="nav-signin border">

                <p><span>Hello, sign in</span></p>

                <p class="nav-second">
                    Account & Lists
                </p>

            </div>

            <!-- RETURNS -->

            <div class="nav-return border">

                <p><span>Returns</span></p>

                <p class="nav-second">
                    & Orders
                </p>

            </div>

            <!-- CART -->

            <div class="nav-cart border">

                <i class="fa-solid fa-cart-shopping"></i>

                Cart

            </div>

        </div>

        <!-- PANEL -->

        <div class="panel">

            <div class="panel-all">

                <i class="fa-solid fa-bars"></i>

                All

            </div>

            <div class="panel-options">

                <p>Today's Deals</p>
                <p>Customer Service</p>
                <p>Registry</p>
                <p>Gift Cards</p>
                <p>Sell</p>

            </div>

            <div class="panel-deals">
                Shop Deals in Electronics
            </div>

        </div>

    </header>

    <!-- HERO SECTION -->

    <div class="hero-section">

        <div class="hero-msg">

            <p>
                Starting ₹70,348 | Engineered for the road
            </p>

        </div>

    </div>

    <!-- SHOP SECTION -->

    <div class="shop-section">

        <div class="box">
            <h2>Laptop</h2>

            <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600"
            class="box-img">
        </div>

        <div class="box">
            <h2>Phone</h2>

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600"
            class="box-img">
        </div>

        <div class="box">
            <h2>Headphones</h2>

            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
            class="box-img">
        </div>

        <div class="box">
            <h2>Watch</h2>

            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600"
            class="box-img">
        </div>

    </div>

</body>
</html>
